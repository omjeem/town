<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#f6f2e8"/>
  <rect x="30" y="30" width="1140" height="570" fill="none" stroke="#2c3e50" stroke-width="2"/>

  <text x="60" y="88" font-family="Georgia, serif" font-size="28" fill="#2c3e50" letter-spacing="6">INTERVIEW SCORECARD</text>
  <text x="1140" y="88" text-anchor="end" font-family="Georgia, serif" font-size="20" fill="#7a8a9a" font-style="italic">{{lens}}</text>
  <line x1="60" y1="110" x2="1140" y2="110" stroke="#2c3e50" stroke-width="1"/>

  <text x="600" y="180" text-anchor="middle" font-family="Georgia, serif" font-size="20" fill="#7a8a9a" letter-spacing="8">SCORE</text>
  <text x="600" y="360" text-anchor="middle" font-family="Impact, Haettenschweiler, sans-serif" font-size="220" fill="#2c3e50" letter-spacing="-4">{{score}}<tspan font-size="100" fill="#a8b3bd">/10</tspan></text>

  <text x="600" y="450" text-anchor="middle" font-family="Georgia, serif" font-size="26" fill="#2c3e50" font-style="italic">&#8220;{{verdict}}&#8221;</text>
  <text x="600" y="500" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#4a5a6a">&#8212; {{interviewer}}</text>

  <line x1="60" y1="548" x2="1140" y2="548" stroke="#2c3e50" stroke-width="1"/>
  <text x="60" y="585" font-family="Georgia, serif" font-size="14" fill="#7a8a9a" letter-spacing="4">TOPIC</text>
  <text x="1140" y="585" text-anchor="end" font-family="Georgia, serif" font-size="18" fill="#4a5a6a" font-style="italic">{{topic}}</text>
</svg>
