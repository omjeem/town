<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" fill="none" shape-rendering="crispEdges">
  <!-- Pixel-art mark on a 32x32 grid (cell = 16px). Composition: short left, peaked center with 10:10 clock, medium right. -->

  <!-- Left building: body + window cutout (evenodd) -->
  <path d="M 64 256 H 160 V 432 H 64 Z M 96 288 H 128 V 320 H 96 Z" fill-rule="evenodd" fill="#1a1a1a"/>

  <!-- Center tower: stepped pyramid 3>5>7>9, body, 5x5 clock cutout with 10:10 hands + center dot (evenodd) -->
  <path d="M 224 80 H 272 V 112 H 288 V 144 H 304 V 176 H 320 V 432 H 176 V 176 H 192 V 144 H 208 V 112 H 224 Z
           M 208 208 H 288 V 288 H 208 Z
           M 224 224 H 240 V 240 H 224 Z
           M 256 224 H 272 V 240 H 256 Z
           M 240 240 H 256 V 256 H 240 Z" fill-rule="evenodd" fill="#1a1a1a"/>

  <!-- Right building: body + window cutout (evenodd) -->
  <path d="M 336 208 H 432 V 432 H 336 Z M 368 240 H 400 V 272 H 368 Z" fill-rule="evenodd" fill="#1a1a1a"/>
</svg>
